<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST University - Elections</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #2E8B57;
            --accent: #007bff;
            --background: #f8fafc;
            --text: #333333;
            --light-gray: #e2e8f0;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header Styles */
        header {
            background: linear-gradient(135deg, var(--primary), #2d3748);
            color: white;
            padding: 2rem 0;
            box-shadow: var(--shadow);
            transform: translateY(-20px);
            animation: slideDown 0.6s ease-out forwards;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo i {
            font-size: 2rem;
            color: var(--secondary);
            transition: transform 0.5s ease, color 0.3s ease;
        }

        .logo:hover i {
            transform: rotate(15deg);
            color: #3cb371;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .user-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid white;
            color: white;
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background-color: var(--secondary);
            color: white;
        }

        .btn-primary:hover {
            background-color: #247a48;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Page Header */
        .page-header {
            padding: 2rem 0;
            text-align: center;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.3s forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header h2 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        .page-header h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }

        .page-header p {
            font-size: 1.1rem;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
            margin-top: 25px;
        }

        /* Filter Section */
        .filter-section {
            background-color: var(--white);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.5s forwards;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .filter-section:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .filter-tab {
            padding: 10px 20px;
            border-radius: 30px;
            background-color: var(--light-gray);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .filter-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
            z-index: 0;
            border-radius: 30px;
        }

        .filter-tab span {
            position: relative;
            z-index: 1;
        }

        .filter-tab.active::before {
            width: 100%;
        }

        .filter-tab.active {
            color: white;
        }

        .filter-tab:not(.active):hover {
            background-color: #d1d9e6;
            transform: translateY(-2px);
        }

        .search-sort {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: var(--light-gray);
            border-radius: 4px;
            padding: 8px 15px;
            flex-grow: 1;
            max-width: 400px;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            box-shadow: 0 0 0 2px var(--accent);
            transform: scale(1.02);
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            padding: 5px 10px;
            transition: all 0.3s ease;
        }

        .sort-options select {
            padding: 8px 15px;
            border-radius: 4px;
            border: 1px solid var(--light-gray);
            background-color: white;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .sort-options select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
        }

        /* Elections Grid */
        .elections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 3rem;
        }

        .election-card {
            background-color: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.6s ease-out forwards;
        }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .election-card:nth-child(1) { animation-delay: 0.7s; }
        .election-card:nth-child(2) { animation-delay: 0.8s; }
        .election-card:nth-child(3) { animation-delay: 0.9s; }
        .election-card:nth-child(4) { animation-delay: 1.0s; }

        .election-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--light-gray);
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.5s ease;
        }

        .election-card:hover .card-header::before {
            transform: scaleX(1);
        }

        .election-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 5px;
            transition: color 0.3s ease;
        }

        .election-card:hover .election-title {
            color: var(--secondary);
        }

        .election-description {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .status-live {
            background-color: #e6f7ee;
            color: var(--secondary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(46, 139, 87, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(46, 139, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 139, 87, 0); }
        }

        .status-upcoming {
            background-color: #e6f2ff;
            color: var(--accent);
        }

        .status-ended {
            background-color: #f2f2f2;
            color: #666;
        }

        .card-body {
            padding: 1.5rem;
        }

        .election-info {
            margin-bottom: 1.5rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }

        .election-card:hover .info-item {
            transform: translateX(5px);
        }

        .info-item i {
            width: 20px;
            color: var(--primary);
            margin-right: 10px;
            transition: color 0.3s ease;
        }

        .election-card:hover .info-item i {
            color: var(--secondary);
        }

        .progress-container {
            margin: 15px 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .progress-bar {
            height: 8px;
            background-color: var(--light-gray);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--secondary);
            border-radius: 4px;
            width: 0;
            transition: width 1.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .card-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--light-gray);
            display: flex;
            justify-content: space-between;
        }

        .btn-card {
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }

        .btn-card::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-card:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-vote {
            background-color: var(--secondary);
            color: white;
        }

        .btn-vote:hover {
            background-color: #247a48;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-details {
            background-color: var(--light-gray);
            color: var(--text);
        }

        .btn-details:hover {
            background-color: #d1d9e6;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-results {
            background-color: var(--accent);
            color: white;
        }

        .btn-results:hover {
            background-color: #0069d9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Voting Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
            animation: modalAppear 0.3s ease-out;
        }

        @keyframes modalAppear {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--light-gray);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--primary), #2d3748);
            color: white;
        }

        .modal-header h3 {
            color: white;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
            transition: transform 0.3s ease;
        }

        .close-modal:hover {
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .candidate-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .candidate-card {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .candidate-card:hover {
            border-color: var(--accent);
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .candidate-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--light-gray);
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #666;
            transition: all 0.3s ease;
        }

        .candidate-card:hover .candidate-img {
            background-color: var(--accent);
            color: white;
            transform: scale(1.1);
        }

        .candidate-info {
            flex-grow: 1;
        }

        .candidate-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .candidate-position {
            font-size: 0.9rem;
            color: #666;
        }

        .vote-btn {
            padding: 8px 15px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .vote-btn:hover {
            background-color: #247a48;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--light-gray);
            display: flex;
            justify-content: flex-end;
        }

        /* Footer */
        footer {
            background-color: var(--primary);
            color: white;
            padding: 2rem 0;
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 1.2s forwards;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .footer-links a {
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }

        .footer-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--secondary);
            transition: width 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--secondary);
        }

        .footer-links a:hover::after {
            width: 100%;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .elections-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            .search-sort {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                max-width: 100%;
            }
        }

        @media (max-width: 576px) {
            .elections-grid {
                grid-template-columns: 1fr;
            }

            .filter-tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h2>Elections Dashboard</h2>
            <p>View and participate in university elections. Cast your vote for student representatives and make your voice heard.</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container">
        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filter-tabs">
                <div class="filter-tab active" data-filter="all"><span>All Elections</span></div>
                <div class="filter-tab" data-filter="active"><span>Active Elections</span></div>
                <div class="filter-tab" data-filter="upcoming"><span>Upcoming Elections</span></div>
                <div class="filter-tab" data-filter="past"><span>Past Elections</span></div>
            </div>
            <div class="search-sort">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search elections...">
                </div>
                <div class="sort-options">
                    <select id="sort-elections">
                        <option value="date">Sort by Date</option>
                        <option value="participation">Sort by Participation</option>
                        <option value="name">Sort by Name</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Elections Grid -->
        <section class="elections-grid">
            
        </section>
    </main>

    <!-- Voting Modal -->
    <div class="modal" id="votingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Cast Your Vote</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Select your preferred candidate for <strong id="electionTitle">Student Union President</strong></p>
                <div class="candidate-list">
                    <!-- Candidate items will be populated by JavaScript -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-details" id="closeModal">Cancel</button>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="../js/common.js"></script>
    <script src="../js/elections.js"></script>
</body>
</html>
