<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FAST Voting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="bg-dark text-white p-3" style="min-width: 250px; min-height: 100vh;">
            <div class="sidebar-heading text-center py-4 fs-4 fw-bold border-bottom">Admin Panel</div>
            <div class="list-group list-group-flush mt-3">
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white active" onclick="showSection('create-election')">➕ Create Election</a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white" onclick="showSection('manage-voters')">👥 Manage Voters</a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white" onclick="showSection('results')">📊 View Results</a>
                <a href="#" class="list-group-item list-group-item-action bg-danger text-white mt-4" onclick="logout()">🚪 Logout</a>
            </div>
        </div>

        <div class="container-fluid p-4">
            <h2 class="mb-4">Admin Dashboard</h2>

            <div id="create-election-section">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Launch New Election</h5>
                    </div>
                    <div class="card-body">
                        <form id="createElectionForm">
                            <div class="mb-3">
                                <label class="form-label">Election Title</label>
                                <input type="text" name="Title" class="form-control" placeholder="e.g. CS President Election 2025" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Description (Manifesto/Details)</label>
                                <textarea name="Description" class="form-control" rows="3" placeholder="Enter election details..."></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Select Campus</label>
                                    <select id="campusSelect" name="CampusID" class="form-select" required>
                                        <option value="">Loading Campuses...</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Select Position</label>
                                    <select name="PositionID" class="form-select" required>
                                        <option value="1">President (Student)</option>
                                        <option value="2">Vice President (Student)</option>
                                        <option value="3">General Secretary (Student)</option>
                                        <option value="4">Club Coordinator (Faculty)</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Start Date & Time</label>
                                    <input type="datetime-local" name="StartDate" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">End Date & Time</label>
                                    <input type="datetime-local" name="EndDate" class="form-control" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100">🚀 Create Election</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div id="manage-voters-section" style="display:none;"><h3>Manage Voters (Coming Soon)</h3></div>
            <div id="results-section" style="display:none;"><h3>Results (Coming Soon)</h3></div>
        </div>
    </div>

    <script src="../js/dashboard_admin.js"></script>
</body>
</html>
