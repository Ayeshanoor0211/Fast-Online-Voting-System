<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Results - FAST Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #2E8B57;
            --accent: #007bff;
            --background: #f8fafc;
            --text: #333333;
            --light-gray: #e2e8f0;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Home Arrow */
        .home-arrow {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            box-shadow: var(--shadow-hover);
            z-index: 1000;
            transition: all 0.3s ease;
            opacity: 0;
            animation: slideInLeft 0.8s ease-out 0.3s forwards;
        }

        .home-arrow:hover {
            transform: scale(1.1) translateX(-5px);
            box-shadow: 0 8px 25px rgba(26, 54, 93, 0.4);
        }

        .home-arrow i {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .home-arrow:hover i {
            transform: translateX(-3px);
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, var(--primary), #2d3748);
            color: white;
            border-radius: 15px;
            box-shadow: var(--shadow-hover);
            opacity: 0;
            animation: slideDown 0.8s ease-out 0.2s forwards;
            position: relative;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .dashboard-header h1 i {
            color: var(--secondary);
            animation: iconPulse 2s infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .dashboard-header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Election Selector */
        .election-selector {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
            transition: all 0.3s ease;
        }

        .election-selector:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .election-selector label {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .election-selector select {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid var(--light-gray);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--white);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .election-selector select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1);
            outline: none;
        }

        /* Results Container */
        #resultsContainer {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        #resultsContainer.show {
            opacity: 1;
            transform: translateY(0);
        }

        .results-header {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .results-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .results-header h2 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .results-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .results-stats p {
            font-size: 1.1rem;
            color: #666;
        }

        .results-stats strong {
            color: var(--primary);
        }

        .results-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 968px) {
            .results-content {
                grid-template-columns: 1fr;
            }
        }

        .results-chart {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .results-chart:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .results-chart::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.6s ease;
        }

        .results-chart:hover::before {
            transform: scaleX(1);
        }

        .results-table {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .results-table:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .results-table h3 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .results-table h3 i {
            color: var(--secondary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, var(--primary), #2d3748);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        tbody tr {
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--light-gray);
        }

        tbody tr:hover {
            background: #f8fafc;
            transform: translateX(5px);
        }

        td {
            padding: 15px;
            color: #555;
        }

        /* Winner Badge */
        .winner-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: linear-gradient(135deg, var(--secondary), #3cb371);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 10px;
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* No Results */
        #noResults {
            text-align: center;
            padding: 60px 20px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        #noResults i {
            font-size: 4rem;
            color: var(--light-gray);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #noResults h3 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        #noResults p {
            color: #666;
            font-size: 1.1rem;
        }

        /* Progress Bars for Results */
        .vote-progress {
            margin-top: 20px;
        }

        .candidate-progress {
            margin-bottom: 15px;
        }

        .candidate-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .progress-bar-container {
            height: 8px;
            background: var(--light-gray);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .dashboard-header h1 {
                font-size: 2rem;
            }

            .election-selector {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }

            .results-stats {
                flex-direction: column;
                gap: 15px;
            }

            .results-content {
                gap: 20px;
            }

            th, td {
                padding: 10px;
            }

            .home-arrow {
                top: 15px;
                left: 15px;
                width: 45px;
                height: 45px;
            }
        }

        @media (max-width: 480px) {
            .dashboard {
                padding: 15px;
            }

            .dashboard-header {
                padding: 20px;
            }

            .results-header, .results-chart, .results-table {
                padding: 20px;
            }

            .home-arrow {
                top: 10px;
                left: 10px;
                width: 40px;
                height: 40px;
            }

            .home-arrow i {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Home Arrow -->
    <a href="../index.html" class="home-arrow" title="Back to Home">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="dashboard">
        <div class="dashboard-header">
            <h1><i class="fas fa-chart-bar"></i> Election Results</h1>
            <p>Live and historical election results with detailed analytics</p>
        </div>

        <!-- Election Selector -->
        <div class="election-selector">
            <label for="electionSelect">Select Election:</label>
            <select id="electionSelect" onchange="loadResults(this.value)">
                <option value="">-- Choose an Election --</option>
                <option value="1">Student Union President 2024</option>
                <option value="2">Class Representative Election</option>
                <option value="3">Faculty Club Coordinator</option>
            </select>
        </div>

        <!-- Results will be displayed here -->
        <div id="resultsContainer">
            <!-- Results content will be loaded here -->
        </div>

        <!-- If no results -->
        <div id="noResults" style="display: none;">
            <i class="fas fa-chart-pie"></i>
            <h3>No Results Available</h3>
            <p>Select an election to view detailed results and analytics.</p>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/results.js"></script>
</body>
</html>
