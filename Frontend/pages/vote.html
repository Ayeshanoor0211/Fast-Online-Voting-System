<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cast Your Vote - FAST Voting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .candidate-card {
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .candidate-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #0d6efd;
        }
        .candidate-card.selected {
            border-color: #198754;
            background-color: #f0fff4;
            transform: scale(1.02);
        }
        .candidate-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto;
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark px-4 py-3 shadow">
        <div class="container">
            <a class="navbar-brand" href="dashboard_student.html">
                <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
            </a>
            <span class="text-white fw-bold">Voting Booth 🗳️</span>
        </div>
    </nav>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h2 id="election-title" class="fw-bold mb-2">Loading Election...</h2>
            <p id="election-desc" class="text-muted">Please wait...</p>
        </div>

        <div id="candidates-container" class="row g-4 justify-content-center">
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>

        <div class="text-center mt-5">
            <button id="submit-vote-btn" class="btn btn-success btn-lg px-5 rounded-pill shadow-lg disabled" onclick="submitVote()">
                <i class="fas fa-paper-plane me-2"></i> Cast My Vote
            </button>
        </div>
    </div>

    <script src="../js/vote.js"></script>
</body>
</html>
