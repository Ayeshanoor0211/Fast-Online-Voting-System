<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FAST University Voting System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login-register.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="login-sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-vote-yea"></i>
                    <span>FAST Voting</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item" onclick="showNotification('Help & Support feature coming soon!', 'info')">
                    <i class="fas fa-question-circle"></i>
                    <span>Help & Support</span>
                </a>
            </nav>

            <div class="sidebar-footer">
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="login-main">
        <div class="login-container">
            <!-- Login Card -->
            <div class="login-card">
                <!-- Header -->
                <div class="login-header">
                    <div class="login-logo">
                        <div class="logo-circle">
                            <i class="fas fa-vote-yea"></i>
                        </div>
                        <h1>FAST University</h1>
                        <p>Online Voting System</p>
                    </div>
                </div>

                <!-- Form -->
                <form class="login-form">
                    <div class="form-group">
                        <div class="input-container">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-input" placeholder=" " required>
                            <label class="input-label">Email Address</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-container">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" class="form-input" placeholder=" " required>
                            <label class="input-label">Password</label>
                            <button type="button" class="password-toggle" id="passwordToggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember me & Forgot password -->
                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-link" onclick="showNotification('Password reset feature coming soon!', 'info')">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-button">
                        <span class="button-text">Sign In</span>
                        <i class="fas fa-arrow-right button-icon"></i>
                    </button>

                    <!-- Sign Up Link -->
                    <div class="signup-section">
                        <p class="signup-text">Don't have an account? <a href="register.html" class="signup-link">Sign up</a></p>
                    </div>
                </form>

                <!-- Footer -->
                <div class="login-footer">
                    <div class="security-badge">
                        <i class="fas fa-shield-alt"></i>
                        <span>Secure & Encrypted Login</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <i class="fas fa-info-circle"></i>
        <span id="notificationMessage">This is a notification</span>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
