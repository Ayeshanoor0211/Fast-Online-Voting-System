<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply as Candidate - FAST Voting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .application-container {
            max-width: 700px;
            width: 100%;
        }

        .application-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        .election-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .char-count {
            font-size: 0.875rem;
            color: #666;
            text-align: right;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
    </button>

    <div class="application-container">
        <div class="application-card">
            <h2 class="text-center mb-4">
                <i class="fas fa-user-tie"></i> Apply as Candidate
            </h2>

            <div class="election-info" id="election-info">
                <h5 id="election-title">Loading election details...</h5>
                <p class="mb-0">
                    <i class="fas fa-university"></i> <span id="election-campus"></span> |
                    <i class="fas fa-calendar"></i> <span id="election-dates"></span>
                </p>
            </div>

            <form id="applicationForm">
                <input type="hidden" id="electionId" name="electionId">

                <div class="mb-4">
                    <label for="symbol" class="form-label">
                        <i class="fas fa-flag"></i> Campaign Symbol *
                    </label>
                    <input type="text" class="form-control" id="symbol" name="symbol" required maxlength="100"
                           placeholder="Enter your campaign symbol (e.g., Lion, Eagle, Star)">
                    <div class="char-count"><span id="symbol-count">0</span>/100</div>
                </div>

                <div class="mb-4">
                    <label for="manifesto" class="form-label">
                        <i class="fas fa-scroll"></i> Manifesto *
                    </label>
                    <textarea class="form-control" id="manifesto" name="manifesto" rows="8" required maxlength="2000"
                              placeholder="Describe your vision, goals, and what you plan to achieve if elected..."></textarea>
                    <div class="char-count"><span id="manifesto-count">0</span>/2000</div>
                </div>

                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i>
                    <strong>Note:</strong> Your application will be reviewed by the admin. You will be notified of the decision.
                </div>

                <button type="submit" class="btn btn-submit">
                    <i class="fas fa-paper-plane"></i> Submit Application
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));

        // Get election ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const electionId = urlParams.get('electionId');

        if (!token || !user) {
            alert('Please login first');
            window.location.href = 'login.html';
        }

        if (!electionId) {
            alert('No election specified');
            goBack();
        }

        document.getElementById('electionId').value = electionId;

        // Load election details
        async function loadElectionDetails() {
            try {
                const response = await fetch(`${API_URL}/elections/active`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                const election = data.elections.find(e => e.ElectionID == electionId);

                if (!election) {
                    alert('Election not found');
                    goBack();
                    return;
                }

                document.getElementById('election-title').textContent = election.Title;
                document.getElementById('election-campus').textContent = election.CampusName;
                document.getElementById('election-dates').textContent =
                    `${new Date(election.StartDate).toLocaleDateString()} - ${new Date(election.EndDate).toLocaleDateString()}`;
            } catch (error) {
                console.error('Error loading election:', error);
                alert('Failed to load election details');
            }
        }

        // Character counters
        document.getElementById('symbol').addEventListener('input', function() {
            document.getElementById('symbol-count').textContent = this.value.length;
        });

        document.getElementById('manifesto').addEventListener('input', function() {
            document.getElementById('manifesto-count').textContent = this.value.length;
        });

        // Handle form submission
        document.getElementById('applicationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = {
                electionId: parseInt(document.getElementById('electionId').value),
                symbol: document.getElementById('symbol').value.trim(),
                manifesto: document.getElementById('manifesto').value.trim()
            };

            if (!formData.symbol || !formData.manifesto) {
                alert('Please fill all required fields');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/candidate-applications/apply`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Application submitted successfully! You will be notified once it is reviewed.');
                    goBack();
                } else {
                    alert(data.error || 'Failed to submit application');
                }
            } catch (error) {
                console.error('Error submitting application:', error);
                alert('Failed to submit application. Please try again.');
            }
        });

        function goBack() {
            window.history.back();
        }

        // Load election details on page load
        loadElectionDetails();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
