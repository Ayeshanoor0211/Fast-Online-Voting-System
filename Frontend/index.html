<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST University Online Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .landing-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            padding: 50px;
            text-align: center;
        }
        .logo {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 15px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .btn-custom {
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            margin: 10px;
            transition: all 0.3s;
        }
        .btn-primary-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        .btn-primary-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-outline-custom {
            border: 2px solid #667eea;
            color: #667eea;
            background: transparent;
        }
        .btn-outline-custom:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
        }
        .features {
            margin-top: 40px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .feature {
            flex: 1;
            padding: 15px;
        }
        .feature i {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 10px;
        }
        .feature h5 {
            color: #333;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="logo">
            <i class="fas fa-vote-yea"></i>
        </div>
        <h1>FAST University</h1>
        <h2>Online Voting System</h2>
        <p>Secure, Transparent & Democratic Elections for Students, Faculty & Management</p>

        <div class="mt-4">
            <a href="pages/login.html" class="btn btn-custom btn-primary-custom">
                <i class="fas fa-sign-in-alt"></i> Login
            </a>
            <a href="pages/register.html" class="btn btn-custom btn-outline-custom">
                <i class="fas fa-user-plus"></i> Register
            </a>
        </div>

        <div class="features">
            <div class="feature">
                <i class="fas fa-shield-alt"></i>
                <h5>Secure</h5>
            </div>
            <div class="feature">
                <i class="fas fa-check-circle"></i>
                <h5>Transparent</h5>
            </div>
            <div class="feature">
                <i class="fas fa-clock"></i>
                <h5>Real-time Results</h5>
            </div>
        </div>

        <div class="mt-4">
            <a href="pages/results.html" class="text-decoration-none">
                <small><i class="fas fa-chart-bar"></i> View Public Results</small>
            </a>
        </div>
    </div>

    <script>
        // Check if user is already logged in
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));

        if (token && user) {
            // Redirect to appropriate dashboard
            if (user.Role === 'Admin') {
                window.location.href = 'pages/dashboard_admin.html';
            } else if (user.Role === 'Student') {
                window.location.href = 'pages/dashboard_student.html';
            } else if (user.Role === 'Faculty') {
                window.location.href = 'pages/dashboard_faculty.html';
            } else if (user.Role === 'Management') {
                window.location.href = 'pages/dashboard_management.html';
            }
        }
    </script>
</body>
</html>
